complete_task:
  name: Complete task
  description: Mark a task as completed, triggering recurrence if configured.
  fields:
    entity_id:
      name: Entity
      description: The todo list entity containing the task.
      required: true
      selector:
        entity:
          integration: recurring_todos
          domain: todo
    task_uid:
      name: Task UID
      description: The unique identifier of the task to complete.
      required: true
      selector:
        text:

snooze_task:
  name: Snooze task
  description: Push a task's due date forward by a number of days.
  fields:
    entity_id:
      name: Entity
      description: The todo list entity containing the task.
      required: true
      selector:
        entity:
          integration: recurring_todos
          domain: todo
    task_uid:
      name: Task UID
      description: The unique identifier of the task to snooze.
      required: true
      selector:
        text:
    days:
      name: Days
      description: Number of days to snooze the task.
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 365
          mode: box

create_task:
  name: Create task
  description: Create a new task with optional recurrence rule.
  fields:
    entity_id:
      name: Entity
      description: The todo list entity to add the task to.
      required: true
      selector:
        entity:
          integration: recurring_todos
          domain: todo
    name:
      name: Name
      description: The name of the task.
      required: true
      selector:
        text:
    description:
      name: Description
      description: Optional description for the task.
      required: false
      selector:
        text:
    due_date:
      name: Due date
      description: The due date for the task (ISO format, e.g. 2026-04-20).
      required: false
      selector:
        date:
    rrule:
      name: Recurrence rule
      description: iCal RRULE string (e.g. FREQ=WEEKLY;BYDAY=MO,WE).
      required: false
      selector:
        text:

update_task:
  name: Update task
  description: Update an existing task's details or recurrence rule.
  fields:
    entity_id:
      name: Entity
      description: The todo list entity containing the task.
      required: true
      selector:
        entity:
          integration: recurring_todos
          domain: todo
    task_uid:
      name: Task UID
      description: The unique identifier of the task to update.
      required: true
      selector:
        text:
    name:
      name: Name
      description: New name for the task.
      required: false
      selector:
        text:
    description:
      name: Description
      description: New description for the task.
      required: false
      selector:
        text:
    due_date:
      name: Due date
      description: New due date (ISO format, e.g. 2026-04-20).
      required: false
      selector:
        date:
    rrule:
      name: Recurrence rule
      description: iCal RRULE string (e.g. FREQ=WEEKLY;BYDAY=MO,WE). Empty to clear.
      required: false
      selector:
        text:
